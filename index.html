<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Chat Stream | Real-time Chat & Media</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; overflow: hidden; }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        .message-appear { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Skeleton Loader Styles --- */
        .skeleton {
            background: #1e293b;
            background: linear-gradient(110deg, #1e293b 8%, #334155 18%, #1e293b 33%);
            background-size: 200% 100%;
            animation: 1.5s shine linear infinite;
        }

        @keyframes shine {
            to { background-position-x: -200%; }
        }

        .typing-dot { animation: typing 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }

        emoji-picker {
            position: absolute;
            bottom: 100px;
            right: 20px;
            z-index: 50;
            display: none;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
            border-radius: 1rem;
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-5xl h-[90vh] glass rounded-3xl overflow-hidden flex shadow-2xl">
        
        <aside class="w-80 border-r border-white/10 hidden md:flex flex-col">
            <div class="p-6 border-b border-white/10 flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center">
                    <i data-lucide="message-square" class="text-white w-6 h-6"></i>
                </div>
                <h1 class="text-xl font-bold text-white tracking-tight">Inbox</h1>
            </div>
            
            <div class="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-2">
                <div class="text-xs font-semibold text-slate-500 uppercase px-2 mb-4">Active Chats</div>
                <div class="bg-blue-600/10 border border-blue-500/20 p-3 rounded-2xl flex items-center gap-3 cursor-pointer">
                    <div class="relative">
                        <div class="w-10 h-10 bg-slate-700 rounded-full flex items-center justify-center text-blue-400 font-bold">G</div>
                        <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-slate-900 rounded-full"></div>
                    </div>
                    <div>
                        <div class="text-sm font-medium text-white">Global Lobby</div>
                        <div id="online-count" class="text-xs text-blue-400">Connecting...</div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative">
            <header class="h-20 border-b border-white/10 px-8 flex items-center justify-between bg-slate-800/30">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-gradient-to-tr from-blue-500 to-purple-500 rounded-full"></div>
                    <div>
                        <h3 class="text-white font-semibold">Global Lobby</h3>
                        <p class="text-xs text-slate-400 flex items-center gap-1">
                            <span id="status-dot" class="w-1.5 h-1.5 bg-yellow-500 rounded-full"></span> 
                            <span id="status-text">Connecting...</span>
                        </p>
                    </div>
                </div>
            </header>

            <div id="message-container" class="flex-1 overflow-y-auto p-8 space-y-6 custom-scrollbar"></div>

            <div id="typing-indicator" class="px-8 py-2 text-xs text-slate-400 flex items-center gap-2 opacity-0 transition-opacity duration-300">
                <span id="typing-user">Someone</span> is typing
                <div class="flex gap-1">
                    <span class="typing-dot w-1 h-1 bg-slate-400 rounded-full"></span>
                    <span class="typing-dot w-1 h-1 bg-slate-400 rounded-full"></span>
                    <span class="typing-dot w-1 h-1 bg-slate-400 rounded-full"></span>
                </div>
            </div>

            <footer class="p-6 bg-slate-900/50 relative">
                <emoji-picker id="emoji-picker" class="light"></emoji-picker>
                
                <form id="chat-form" class="relative flex items-center gap-3">
                    <div class="flex-1 relative flex items-center bg-slate-800 border border-white/10 rounded-2xl px-4 focus-within:ring-2 focus-within:ring-blue-500/50 transition-all">
                        
                        <label class="cursor-pointer text-slate-500 hover:text-white transition p-2">
                            <i data-lucide="paperclip" class="w-5 h-5"></i>
                            <input type="file" id="image-input" accept="image/*" class="hidden" />
                        </label>

                        <input 
                            id="msg-input"
                            type="text" 
                            placeholder="Type a message..." 
                            class="w-full bg-transparent text-white py-4 px-2 focus:outline-none placeholder:text-slate-500"
                        />
                        
                        <button id="emoji-btn" type="button" class="text-slate-500 hover:text-white transition p-2">
                            <i data-lucide="smile" class="w-5 h-5"></i>
                        </button>
                    </div>
                    
                    <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white p-4 rounded-2xl transition shadow-lg shadow-blue-900/20 active:scale-95">
                        <i data-lucide="send" class="w-5 h-5"></i>
                    </button>
                </form>
            </footer>
        </main>
    </div>

    <script>
        lucide.createIcons();

        const messageContainer = document.getElementById('message-container');
        const chatForm = document.getElementById('chat-form');
        const msgInput = document.getElementById('msg-input');
        const imageInput = document.getElementById('image-input');
        const onlineCount = document.getElementById('online-count');
        const typingIndicator = document.getElementById('typing-indicator');
        const typingUser = document.getElementById('typing-user');
        const emojiBtn = document.getElementById('emoji-btn');
        const emojiPicker = document.getElementById('emoji-picker');
        
        const username = prompt("Enter your name") || "User_" + Math.floor(Math.random() * 100);
        
        // --- Skeleton Logic ---
        function showSkeletons() {
            const skeletonHtml = `
                <div id="skeleton-wrapper" class="space-y-6 transition-opacity duration-500">
                    <div class="flex justify-start items-end gap-3 opacity-40">
                        <div class="w-8 h-8 skeleton rounded-full"></div>
                        <div class="space-y-2"><div class="w-48 h-12 skeleton rounded-r-2xl rounded-tl-2xl"></div><div class="w-16 h-2 skeleton ml-2"></div></div>
                    </div>
                    <div class="flex justify-end items-end gap-3 opacity-40">
                        <div class="space-y-2"><div class="w-64 h-16 skeleton rounded-l-2xl rounded-tr-2xl"></div><div class="w-20 h-2 skeleton ml-auto mr-2"></div></div>
                    </div>
                    <div class="flex justify-start items-end gap-3 opacity-40">
                        <div class="w-8 h-8 skeleton rounded-full"></div>
                        <div class="space-y-2"><div class="w-32 h-10 skeleton rounded-r-2xl rounded-tl-2xl"></div><div class="w-12 h-2 skeleton ml-2"></div></div>
                    </div>
                </div>
            `;
            messageContainer.innerHTML = skeletonHtml;
        }

        const ws = new WebSocket("wss://realtime-chat-app-websocket.onrender.com/");
        let typingTimeout;

        ws.onopen = () => {
            document.getElementById('status-dot').className = "w-1.5 h-1.5 bg-green-500 rounded-full";
            document.getElementById('status-text').textContent = "WebSocket Connected";
            
            // Remove skeletons once connected
            setTimeout(() => {
                const wrapper = document.getElementById('skeleton-wrapper');
                if (wrapper) {
                    wrapper.style.opacity = '0';
                    setTimeout(() => {
                        wrapper.remove();
                        addMessage("Welcome to the Global Lobby!", false, "System");
                    }, 500);
                }
            }, 1500);
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === "users") {
                onlineCount.textContent = `${data.count} members online`;
                return;
            }
            if (data.type === "typing" && data.user !== username) {
                typingUser.textContent = data.user;
                typingIndicator.style.opacity = "1";
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => typingIndicator.style.opacity = "0", 3000);
                return;
            }
            if (data.type === "message") {
                const isMe = data.user === username;
                addMessage(data.message, isMe, data.user, data.time, data.isImage);
                typingIndicator.style.opacity = "0";
            }
        };

        function addMessage(content, isMe = false, sender = "", time = "", isImage = false) {
            const displayTime = time || new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const messageBody = isImage 
                ? `<img src="${content}" class="rounded-lg max-w-full max-h-64 object-cover cursor-zoom-in" onclick="window.open(this.src)" onload="scrollToBottom()"/>`
                : `<p class="text-sm leading-relaxed">${content}</p>`;

            const msgHtml = `
                <div class="flex ${isMe ? 'justify-end' : 'justify-start'} message-appear">
                    <div class="max-w-[75%]">
                        ${!isMe ? `<p class="text-[10px] text-blue-400 ml-2 mb-1 font-bold uppercase">${sender}</p>` : ''}
                        <div class="${isMe ? 'bg-blue-600 text-white rounded-l-2xl rounded-tr-2xl shadow-blue-500/20' : 'bg-slate-800 text-slate-200 rounded-r-2xl rounded-tl-2xl'} p-3 shadow-lg">
                            ${messageBody}
                        </div>
                        <p class="text-[10px] text-slate-500 mt-1 ${isMe ? 'text-right' : 'text-left'} font-bold uppercase tracking-tighter">${displayTime}</p>
                    </div>
                </div>
            `;
            messageContainer.insertAdjacentHTML('beforeend', msgHtml);
            scrollToBottom();
        }

        function scrollToBottom() { messageContainer.scrollTop = messageContainer.scrollHeight; }

        chatForm.onsubmit = (e) => {
            e.preventDefault();
            const val = msgInput.value.trim();
            if (val) {
                ws.send(JSON.stringify({ type: "message", user: username, message: val, isImage: false }));
                msgInput.value = '';
                emojiPicker.style.display = 'none';
            }
        };

        imageInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                ws.send(JSON.stringify({ type: "message", user: username, message: event.target.result, isImage: true }));
            };
            reader.readAsDataURL(file);
            e.target.value = '';
        };

        msgInput.addEventListener("input", () => {
            ws.send(JSON.stringify({ type: "typing", user: username }));
        });

        emojiBtn.onclick = () => emojiPicker.style.display = emojiPicker.style.display === 'block' ? 'none' : 'block';
        emojiPicker.addEventListener('emoji-click', e => { msgInput.value += e.detail.unicode; msgInput.focus(); });

        window.onload = showSkeletons;
    </script>
</body>
</html>
