<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Chat Stream by Sparsh Chandra | Real-time Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
        
        .message-appear {
            animation: slideUp 0.3s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-5xl h-[85vh] glass rounded-3xl overflow-hidden flex shadow-2xl">
        
        <aside class="w-80 border-r border-white/10 hidden md:flex flex-col">
            <div class="p-6 border-b border-white/10 flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center">
                    <i data-lucide="message-square" class="text-white w-6 h-6"></i>
                </div>
                <h1 class="text-xl font-bold text-white tracking-tight">Stream</h1>
            </div>
            
            <div class="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-2">
                <div class="text-xs font-semibold text-slate-500 uppercase px-2 mb-4">Active Chats</div>
                <div class="bg-blue-600/10 border border-blue-500/20 p-3 rounded-2xl flex items-center gap-3 cursor-pointer">
                    <div class="relative">
                        <div class="w-10 h-10 bg-slate-700 rounded-full flex items-center justify-center text-blue-400 font-bold">G</div>
                        <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-slate-900 rounded-full"></div>
                    </div>
                    <div>
                        <div class="text-sm font-medium text-white">Global Lobby</div>
                        <div class="text-xs text-blue-400">12 members online</div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative">
            
            <header class="h-20 border-b border-white/10 px-8 flex items-center justify-between bg-slate-800/30">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-gradient-to-tr from-blue-500 to-purple-500 rounded-full"></div>
                    <div>
                        <h3 class="text-white font-semibold">Global Lobby</h3>
                        <p class="text-xs text-slate-400 flex items-center gap-1">
                            <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span> WebSocket Connected
                        </p>
                    </div>
                </div>
                <div class="flex gap-4 text-slate-400">
                    <button class="hover:text-white transition"><i data-lucide="phone"></i></button>
                    <button class="hover:text-white transition"><i data-lucide="more-vertical"></i></button>
                </div>
            </header>

            <div id="message-container" class="flex-1 overflow-y-auto p-8 space-y-6 custom-scrollbar">
                </div>

            <div id="typing-indicator" class="px-8 py-2 text-xs text-slate-400 italic hidden">
                Someone is typing...
            </div>

            <footer class="p-6 bg-slate-900/50">
                <form id="chat-form" class="relative flex items-center gap-3">
                    <div class="flex-1 relative">
                        <input 
                            id="msg-input"
                            type="text" 
                            placeholder="Type a message..." 
                            class="w-full bg-slate-800 border border-white/10 text-white rounded-2xl py-4 px-6 pr-12 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all placeholder:text-slate-500"
                        />
                        <button type="button" class="absolute right-4 top-4 text-slate-500 hover:text-white transition">
                            <i data-lucide="smile" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white p-4 rounded-2xl transition shadow-lg shadow-blue-900/20 active:scale-95">
                        <i data-lucide="send" class="w-5 h-5"></i>
                    </button>
                </form>
            </footer>
        </main>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        const messageContainer = document.getElementById('message-container');
        const chatForm = document.getElementById('chat-form');
        const msgInput = document.getElementById('msg-input');
        const username = prompt ("Enter your name");
        
        // --- WebSocket Logic ---
        // Change the URL to your actual WebSocket server
        // const socket = new WebSocket('ws://localhost:8080');
       const ws = new WebSocket("wss://realtime-chat-app-websocket.onrender.com/");
          let lastMessage = "";

ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    // 🟢 ONLINE USERS
    if (data.type === "users") {
        document.querySelector(".members").textContent =
            data.count + " members online";
        return;
    }

    // 🟡 TYPING
    if (data.type === "typing") {
        console.log(data.user + " is typing...");
        return;
    }

    // 🔵 MESSAGE
    if (data.type === "message") {
        if (data.user === username) {
            addMessage(data.message + " • " + data.time, true);
        } else {
            addMessage(data.user + ": " + data.message + " • " + data.time, false);
        }
    }
};

        function addMessage(text, isMe = false) {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const msgHtml = `
                <div class="flex ${isMe ? 'justify-end' : 'justify-start'} message-appear">
                    <div class="max-w-[70%]">
                        <div class="${isMe ? 'bg-blue-600 text-white rounded-l-2xl rounded-tr-2xl shadow-blue-500/20' : 'bg-slate-800 text-slate-200 rounded-r-2xl rounded-tl-2xl'} p-4 shadow-lg">
                            <p class="text-sm leading-relaxed">${text}</p>
                        </div>
                        <p class="text-[10px] text-slate-500 mt-1 ${isMe ? 'text-right' : 'text-left'} uppercase tracking-widest font-bold">${time}</p>
                    </div>
                </div>
            `;
            messageContainer.insertAdjacentHTML('beforeend', msgHtml);
            messageContainer.scrollTop = messageContainer.scrollHeight;
        }

     chatForm.onsubmit = (e) => {
        e.preventDefault();

        const val = msgInput.value.trim();

        if (val) {
            ws.send(JSON.stringify({
        type: "message",
        user: username,
        message: val
        }));

        msgInput.addEventListener("input", () => {
    ws.send(JSON.stringify({
        type: "typing",
        user: username
        }));
    });
            msgInput.value = '';
        }
    };

        // Welcome Message
        window.onload = () => {
            addMessage("Welcome to the Stream chat! Type a message below to see the UI in action.", false);
        };
    </script>
</body>
</html>
