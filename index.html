<script>
lucide.createIcons();

const loginOverlay = document.getElementById('login-overlay');
const mainApp = document.getElementById('main-app');
const joinBtn = document.getElementById('join-btn');
const userInp = document.getElementById('username-input');
const messageContainer = document.getElementById('message-container');
const typingDiv = document.getElementById('status-text');

let username = "";
let ws;
let typingTimer;

// --- LOGIN ---
joinBtn.onclick = () => {
    const val = userInp.value.trim();
    if (val) {
        username = val;
        loginOverlay.style.opacity = '0';
        setTimeout(() => {
            loginOverlay.style.display = 'none';
            mainApp.classList.remove('hidden-app');
            initWebSocket();
        }, 500);
    }
};

// --- WEBSOCKET ---
function initWebSocket() {
    showSkeletons();

    ws = new WebSocket("wss://realtime-chat-app-websocket.onrender.com/");

    // 🔥 JOIN EVENT
    ws.onopen = () => {
        ws.send(JSON.stringify({
            type: "join",
            user: username
        }));

        document.getElementById('status-text').innerHTML = `<span class="text-green-500">● Connected</span>`;

        setTimeout(() => {
            const skeleton = document.getElementById('skeleton-wrapper');
            if (skeleton) skeleton.remove();
            addMessage(`Welcome to ChatTrix, ${username}!`, false, "System");
        }, 800);
    };

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);

        // 🟢 USERS LIST
        if (data.type === "users") {
            document.getElementById('online-count').textContent =
                `${data.users.length} members online`;
            return;
        }

        // 🟡 TYPING
        if (data.type === "typing" && data.user !== username) {
            typingDiv.innerHTML = `${data.user} is typing...`;

            clearTimeout(window.typingTimeout);
            window.typingTimeout = setTimeout(() => {
                typingDiv.innerHTML = `<span class="text-green-500">● Connected</span>`;
            }, 1500);

            return;
        }

        // 🔴 PRIVATE MESSAGE
        if (data.type === "private") {
            addMessage(`(Private) ${data.from}: ${data.message}`, false, data.from, data.time);
            return;
        }

        // 🔵 GLOBAL MESSAGE
        if (data.type === "message") {
            addMessage(
                data.message,
                data.user === username,
                data.user,
                data.time,
                data.isImage
            );
        }
    };
}

// --- ADD MESSAGE ---
function addMessage(content, isMe = false, sender = "", time = "", isImage = false) {
    const displayTime = time || new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    const messageBody = isImage
        ? `<img src="${content}" class="rounded-lg max-w-full max-h-64 object-cover cursor-pointer" onclick="window.open(this.src)" />`
        : `<p class="text-sm">${content}</p>`;

    const msgHtml = `
        <div class="flex ${isMe ? 'justify-end' : 'justify-start'} message-appear">
            <div class="max-w-[75%]">
                ${!isMe ? `<p class="text-[10px] text-blue-400 ml-2 mb-1 font-bold uppercase">${sender}</p>` : ''}
                <div class="${isMe ? 'bg-blue-600 text-white rounded-l-2xl rounded-tr-2xl' : 'bg-slate-800 text-slate-200 rounded-r-2xl rounded-tl-2xl'} p-3">
                    ${messageBody}
                </div>
                <p class="text-[10px] text-slate-500 mt-1 ${isMe ? 'text-right' : 'text-left'} font-bold">${displayTime}</p>
            </div>
        </div>`;

    messageContainer.insertAdjacentHTML('beforeend', msgHtml);
    scrollToBottom();
}

// --- SKELETON ---
function showSkeletons() {
    messageContainer.innerHTML = `
        <div id="skeleton-wrapper" class="space-y-6">
            <div class="flex justify-start gap-3 opacity-40"><div class="w-8 h-8 skeleton rounded-full"></div><div class="w-48 h-12 skeleton rounded-2xl"></div></div>
            <div class="flex justify-end gap-3 opacity-40"><div class="w-64 h-16 skeleton rounded-2xl"></div></div>
        </div>`;
}

function scrollToBottom() {
    messageContainer.scrollTop = messageContainer.scrollHeight;
}

// --- SEND MESSAGE ---
document.getElementById('chat-form').onsubmit = (e) => {
    e.preventDefault();

    const msgInp = document.getElementById('msg-input');
    const val = msgInp.value.trim();

    if (!val) return;

    ws.send(JSON.stringify({
        type: "message",
        user: username,
        message: val,
        isImage: false
    }));

    msgInp.value = '';
};

// --- TYPING EVENT (debounced)
document.getElementById('msg-input').addEventListener("input", () => {
    clearTimeout(typingTimer);

    typingTimer = setTimeout(() => {
        ws.send(JSON.stringify({
            type: "typing",
            user: username
        }));
    }, 300);
});

// --- IMAGE ---
document.getElementById('image-input').onchange = (e) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
        ws.send(JSON.stringify({
            type: "message",
            user: username,
            message: ev.target.result,
            isImage: true
        }));
    };
    reader.readAsDataURL(e.target.files[0]);
};

// --- EMOJI ---
const eb = document.getElementById('emoji-btn');
const ep = document.getElementById('emoji-picker');

eb.onclick = (e) => {
    e.stopPropagation();
    ep.style.display = ep.style.display === 'block' ? 'none' : 'block';
};

ep.addEventListener('emoji-click', e => {
    document.getElementById('msg-input').value += e.detail.unicode;
});

document.addEventListener('click', () => { ep.style.display = 'none'; });
ep.onclick = (e) => e.stopPropagation();
</script>
