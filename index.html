<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Chat Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="h-screen flex items-center justify-center bg-slate-900">

<div class="w-full max-w-5xl h-[85vh] bg-slate-800 rounded-3xl flex flex-col overflow-hidden">

    <div id="message-container" class="flex-1 overflow-y-auto p-6 space-y-4"></div>

    <!-- ✅ Typing UI -->
    <div id="typing-indicator" class="px-6 py-1 text-xs text-gray-400 italic hidden"></div>

    <form id="chat-form" class="p-4 flex gap-3">
        <input id="msg-input" class="flex-1 p-3 rounded bg-slate-700 text-white" placeholder="Type..." />
        <button class="bg-blue-600 px-4 rounded">Send</button>
    </form>

</div>

<script>
lucide.createIcons();

const messageContainer = document.getElementById('message-container');
const chatForm = document.getElementById('chat-form');
const msgInput = document.getElementById('msg-input');
const typingDiv = document.getElementById("typing-indicator");

const username = prompt("Enter your name");

// 🔌 WebSocket
const ws = new WebSocket("wss://realtime-chat-app-websocket.onrender.com/");

// 🧠 RECEIVE MESSAGE
ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    // 🟢 USERS (optional)
    if (data.type === "users") return;

    // 🟡 TYPING UI
    if (data.type === "typing" && data.user !== username) {
        typingDiv.textContent = data.user + " is typing...";
        typingDiv.classList.remove("hidden");

        clearTimeout(window.typingTimeout);
        window.typingTimeout = setTimeout(() => {
            typingDiv.classList.add("hidden");
        }, 1500);

        return;
    }

    // 🔵 MESSAGE
    if (data.type === "message") {
        if (data.user === username) {
            addMessage(data.message + " • " + data.time, true);
        } else {
            addMessage(data.user + ": " + data.message + " • " + data.time, false);
        }
    }
};

// 💬 ADD MESSAGE
function addMessage(text, isMe = false) {
    const div = document.createElement("div");
    div.className = isMe ? "text-right" : "text-left";

    div.innerHTML = `
        <span class="inline-block bg-blue-600 text-white px-4 py-2 rounded-lg">
            ${text}
        </span>
    `;

    messageContainer.appendChild(div);
    messageContainer.scrollTop = messageContainer.scrollHeight;
}

// 📤 SEND MESSAGE
chatForm.onsubmit = (e) => {
    e.preventDefault();

    const val = msgInput.value.trim();
    if (!val) return;

    ws.send(JSON.stringify({
        type: "message",
        user: username,
        message: val
    }));

    msgInput.value = '';
};

// ⚡ TYPING EVENT (debounced)
let typingTimer;

msgInput.addEventListener("input", () => {
    clearTimeout(typingTimer);

    typingTimer = setTimeout(() => {
        ws.send(JSON.stringify({
            type: "typing",
            user: username
        }));
    }, 300);
});

// Welcome
window.onload = () => {
    addMessage("Welcome to chat!", false);
};
</script>

</body>
</html>
